services:
  server:
      build: .
      ports:
        - 3000:3000
      depends_on:
        db:
          condition: service_healthy

  db:
    image: postgres:9.6-alpine
    environment:
      - PGUSER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ordo
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5